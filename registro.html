<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celebra Barranquilla/registro</title>
    <link rel="stylesheet" href="static/registro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <!-- 1. HEADER (Fondo Blanco) -->
    <header class="header">
        <div class="logo">
             <img src="static/logo.png" alt="Logo Celebra">
        </div>

        <a href="index.html" class="btn-register">
            volver al inicio
        </a>
    </header>


    <!-- SECCIÓN DE REGISTRO -->
    <main class="register-section">
        <div class="register-container">
            
            <!-- Contenedor Izquierdo: Formulario -->
            <div class="register-card">
                <h2>Regístrate en Celebra</h2>
                <p class="register-subtitle">Conoce nuestros increíbles paquetes disponibles para hacer de tu evento un momento inolvidable.</p>
                
                <!-- Conectamos con FormSubmit usando tus clases de diseño originales -->
                <form id="registrationForm" action="https://formsubmit.co/perezvillalbavalerie@gmail.com" method="POST" class="form-register">
                    
                    <!-- Campo: Nombre de Usuario -->
                    <div class="form-group">
                        <label for="username">Nombre de usuario</label>
                        <!-- El 'name' es lo que le llegará en texto al profesor por correo -->
                        <input type="text" id="username" name="Nombre de Usuario" placeholder="ej. juan_perez" minlength="4" required>
                    </div>

                    <!-- Campo: Correo electrónico -->
                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="Correo del Usuario" placeholder="ejemplo@gmail.com" required>
                    </div>
                    
                    <!-- Campo: Contraseña (Sin atributo 'name' para que no viaje por correo) -->
                    <div class="form-group">
                        <label for="password">Contraseña (Mínimo 8 caracteres)</label>
                        <input type="password" id="password" placeholder="••••••••" minlength="8" required>
                    </div>
                    
                    <!-- Parámetros ocultos que te pidió el profesor -->
                    <input type="hidden" name="_subject" value="Alerta de Nuevo Registro - Proyecto Celebra">
                    <input type="hidden" name="_captcha" value="false">
                    
                    <!-- NOTA: Cambia 'tu-usuario' y 'tu-repositorio' por los tuyos de GitHub Pages -->
                    <input type="hidden" name="_next" value="https://valseishi.github.io/Celebra-Barranquilla/userview.html">
                    
                    <!-- Tu botón original con su estilo morado -->
                    <button type="submit" class="btn-submit-register">Registrarme</button>
                </form>
            </div>

            <!-- Contenedor Derecho: Galería Asimétrica de Bloques -->
            <div class="register-gallery">
                <div class="reg-col reg-col-left">
                    <div class="reg-block block-small"></div>
                    <div class="reg-block block-medium"></div>
                </div>
                <div class="reg-col reg-col-right">
                    <div class="reg-block block-large"></div>
                    <div class="reg-block block-xlarge"></div>
                </div>
            </div>

        </div>
    </main>

    <!-- LÓGICA JAVASCRIPT EXCLUSIVA DE MEMORIA -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const regForm = document.getElementById('registrationForm');

            if (regForm) {
                // Escuchamos el clic justo antes de que los datos viajen a FormSubmit
                regForm.addEventListener('submit', function() {
                    // Tomamos el valor de la casilla de usuario
                    const username = document.getElementById('username').value.trim();
                    
                    // Lo guardamos en la memoria local para el userview.html
                    localStorage.setItem('currentUser', username);
                    
                    // Al no poner event.preventDefault(), dejamos que la acción nativa continúe.
                    // FormSubmit procesará el correo real y enviará al usuario a 'userview.html'.
                });
            }
        });
    </script>


</body>
</html>
