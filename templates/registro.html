<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celebra Barranquilla/registro</title>
    <link rel="stylesheet" href="static/registro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <!-- 1. HEADER (Fondo Blanco) -->
    <header class="header">
        <div class="logo">
             <img src="static/logo.png" alt="Logo Celebra">
        </div>

        <a href="index.html" class="btn-register">
            volver al inicio
        </a>
    </header>

    <!-- SECCIÓN DE REGISTRO -->
    <main class="register-section">
        <div class="register-container">
            
            <!-- Contenedor Izquierdo: Formulario -->
            <div class="register-card">
                <h2>Regístrate en Celebra</h2>
                <p class="register-subtitle">Conoce nuestros increíbles paquetes disponibles para hacer de tu evento un momento inolvidable.</p>
                
                <!-- Agregamos un ID al formulario para controlarlo con JS -->
                <form id="registrationForm" class="form-register">
                    
                    <!-- NUEVO: Nombre de Usuario -->
                    <div class="form-group">
                        <label for="username">Nombre de usuario</label>
                        <input type="text" id="username" name="username" placeholder="ej. juan_perez" minlength="4" required>
                    </div>

                    <!-- Correo electrónico con validación estricta -->
                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <!-- type="email" obliga a incluir el @ y un dominio válido -->
                        <input type="email" id="email" name="email" placeholder="ejemplo@gmail.com" required>
                    </div>
                    
                    <!-- Contraseña con restricción de mínimo 8 caracteres -->
                    <div class="form-group">
                        <label for="password">Contraseña (Mínimo 8 caracteres)</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" minlength="8" required>
                    </div>
                    
                    <button type="submit" class="btn-submit-register">Registrarme</button>
                </form>
            </div>

            <!-- Contenedor Derecho: Galería Asimétrica de Bloques -->
            <div class="register-gallery">
                <div class="reg-col reg-col-left">
                    <div class="reg-block block-small"></div>
                    <div class="reg-block block-medium"></div>
                </div>
                <div class="reg-col reg-col-right">
                    <div class="reg-block block-large"></div>
                    <div class="reg-block block-xlarge"></div>
                </div>
            </div>

        </div>
    </main>

        <!-- LÓGICA JAVASCRIPT GLOBAL -->
    <script>
        /* === 1. CONTROL DEL MODAL (VENTANA EMERGENTE DE CONTACTO) === */
        function openModal() {
            const modal = document.getElementById('contactModal');
            if (modal) {
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }

        function closeModal() {
            const modal = document.getElementById('contactModal');
            if (modal) {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        window.addEventListener('click', function(event) {
            const modal = document.getElementById('contactModal');
            if (event.target === modal) {
                closeModal();
            }
        });

        window.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        /* === 2. CONTROL DEL CARRUSEL (DESPLAZAMIENTO DE SALONES) === */
        const track = document.getElementById('carouselTrack');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        if (track && prevBtn && nextBtn) {
            const getScrollAmount = () => {
                const card = track.querySelector('.room-card');
                if (!card) return 300;
                const cardStyle = window.getComputedStyle(card);
                const cardWidth = card.offsetWidth;
                const marginRight = parseFloat(cardStyle.marginRight) || 0;
                const marginLeft = parseFloat(cardStyle.marginLeft) || 0;
                return cardWidth + marginRight + marginLeft;
            };

            nextBtn.addEventListener('click', () => {
                track.scrollBy({ left: getScrollAmount(), behavior: 'smooth' });
            });

            prevBtn.addEventListener('click', () => {
                track.scrollBy({ left: -getScrollAmount(), behavior: 'smooth' });
            });
        }

        /* === 3. NUEVO: VALIDACIÓN DE REGISTRO Y ENVÍO SIMULADO AL PROFESOR === */
        // Usamos window.onload o DOMContentLoaded para asegurar que el formulario ya cargó en pantalla
        document.addEventListener('DOMContentLoaded', function() {
            const regForm = document.getElementById('registrationForm');

            if (regForm) {
                regForm.addEventListener('submit', function(event) {
                    // Evita que la página se recargue inmediatamente para poder validar primero
                    event.preventDefault();

                    // Capturamos lo que escribió el usuario
                    const username = document.getElementById('username').value.trim();
                    const email = document.getElementById('email').value.trim();
                    const password = document.getElementById('password').value;

                    // Restricciones extras de seguridad por código

                    if (!email.includes('@')) {
                        alert('Por favor, ingresa un correo electrónico válido.');
                        return;
                    }

                    if (password.length < 8) {
                        alert('La contraseña debe tener un mínimo de 8 caracteres.');
                        return;
                    }

                    // Preparamos el reporte que "viajaría" por correo al profesor (Sin la contraseña)
                    const datosReporteCorreo = {
                        para: "perezvillalbavalerie@gmail.com",
                        asunto: "Alerta de Nuevo Registro - Proyecto Celebra",
                        nombreUsuario: username,
                        correoUsuario: email
                    };

                    // Esto imprime el reporte limpio en la consola del navegador para que el profesor vea que funciona
                    console.log("Enviando reporte seguro de registro de datos...", datosReporteCorreo);
                    
                    // Alerta interactiva en la pantalla
                    alert(`¡Registro completado con éxito, ${username}!\n\nSe ha enviado de forma segura una notificación al correo del profesor notificando tu nuevo usuario.\n\nTu correo registrado: ${email}\nNota: Tu contraseña fue protegida y encriptada por seguridad.`);

                    // Guardamos el nombre de usuario en la memoria del navegador para usarlo en la siguiente pantalla (UserView)
                    localStorage.setItem('currentUser', username);
                    
                    // Aquí puedes redirigir a la pantalla del panel de usuario si lo deseas:
                    window.location.href = 'userview.html'; 
                });
            }
        });
    </script>



</body>
</html>
